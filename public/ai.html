<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - DEVHUB</title>
    
    <!-- Adsterra Ad -->
    <script src="https://penguinsincequalify.com/f4/63/a7/f463a78a655d5b6a10eaeec7146802e9.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Theme Variables */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255,255,255,0.05);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --user-msg: linear-gradient(135deg, #6366f1, #4f46e5);
            --ai-msg: rgba(255,255,255,0.1);
        }
        
        body.light {
            --bg-primary: #f8fafc;
            --bg-secondary: #e2e8f0;
            --bg-card: rgba(0,0,0,0.03);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: rgba(0,0,0,0.1);
            --primary: #6366f1;
            --user-msg: linear-gradient(135deg, #6366f1, #4f46e5);
            --ai-msg: rgba(0,0,0,0.05);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        
        /* Navbar */
        .navbar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-btn {
            color: var(--text-secondary);
            text-decoration: none;
        }
        
        /* Theme Toggle */
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.3rem;
            cursor: pointer;
            display: flex;
            gap: 0.3rem;
        }
        .theme-toggle span {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .theme-toggle span.active {
            background: var(--primary);
            color: white;
        }
        
        /* Chat Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .chat-container {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            height: 70vh;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        /* Message Bubbles */
        .message {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .message.user .bubble {
            background: var(--user-msg);
            border-radius: 20px 20px 4px 20px;
        }
        .message.assistant .bubble {
            background: var(--ai-msg);
            border-radius: 20px 20px 20px 4px;
        }
        .bubble {
            max-width: 70%;
            padding: 1rem;
            border-radius: 20px;
        }
        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }
        
        /* Chat Input */
        .chat-input {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
        }
        .chat-input input {
            flex: 1;
            padding: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 1rem;
        }
        .chat-input input:focus { outline: none; border-color: var(--primary); }
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: var(--primary);
            color: white;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        
        /* Typing Animation */
        .typing { display: flex; gap: 0.3rem; padding: 1rem; }
        .typing span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            margin-top: 2rem;
        }
        
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .bubble { max-width: 85%; }
            .message { gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <div class="logo">🤖 AI Assistant</div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="theme-toggle" id="themeToggle">
                    <span class="dark active" onclick="setTheme('dark')"><i class="fas fa-moon"></i></span>
                    <span class="light" onclick="setTheme('light')"><i class="fas fa-sun"></i></span>
                </div>
                <div id="authStatus"></div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="avatar"><i class="fas fa-robot"></i></div>
                    <div class="bubble">Hello! I'm your AI assistant powered by DeepSeek-V3. Ask me anything! 💬</div>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Made with <i class="fas fa-heart" style="color:#ec4899;"></i> by <strong>Dev Gift</strong> | +2349164624021</p>
    </footer>

    <script>
        const token = localStorage.getItem('token');
        let isLoading = false;
        
        // Theme management
        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('theme', theme);
            document.querySelectorAll('.theme-toggle span').forEach(span => {
                span.classList.remove('active');
                if ((theme === 'dark' && span.classList.contains('dark')) ||
                    (theme === 'light' && span.classList.contains('light'))) {
                    span.classList.add('active');
                }
            });
            // Save to server
            if (token) {
                fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ theme })
                }).catch(e => console.log);
            }
        }
        
        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);
        
        // Auth check
        if (!token) {
            document.getElementById('authStatus').innerHTML = '<a href="/login.html" style="color:#6366f1;">Login to use AI</a>';
            document.getElementById('messageInput').disabled = true;
        } else {
            document.getElementById('authStatus').innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle"></i> Ready</span>';
            loadHistory();
        }
        
        async function loadHistory() {
            try {
                const res = await fetch('/api/ai/history', { headers: { 'Authorization': `Bearer ${token}` } });
                const history = await res.json();
                if (history && history.length) {
                    const messagesDiv = document.getElementById('chatMessages');
                    messagesDiv.innerHTML = history.map(h => `
                        <div class="message user"><div class="bubble">${escapeHtml(h.message)}</div><div class="avatar"><i class="fas fa-user"></i></div></div>
                        <div class="message assistant"><div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">${escapeHtml(h.response)}</div></div>
                    `).join('');
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            } catch(e) {}
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || isLoading) return;
            
            input.value = '';
            isLoading = true;
            
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML += `<div class="message user"><div class="bubble">${escapeHtml(message)}</div><div class="avatar"><i class="fas fa-user"></i></div></div>`;
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `<div class="avatar"><i class="fas fa-robot"></i></div><div class="typing"><span></span><span></span><span></span></div>`;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            try {
                const res = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                typingDiv.remove();
                const responseText = data.response || "Thanks for your message! How can I help you further?";
                messagesDiv.innerHTML += `<div class="message assistant"><div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">${escapeHtml(responseText)}</div></div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch(e) {
                typingDiv.remove();
                messagesDiv.innerHTML += `<div class="message assistant"><div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">I'm here to help! What would you like to know?</div></div>`;
            }
            isLoading = false;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
