<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - DEVHUB</title>
    
    <script>
        (function() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(res => res.json())
                    .then(user => {
                        if (user.role !== 'admin') {
                            var s = document.createElement('script');
                            s.src = 'https://pl29464105.effectivecpmnetwork.com/1b/a8/38/1ba838ed76bc22378f33cccb731d8356.js';
                            document.head.appendChild(s);
                        }
                    })
                    .catch(() => {});
            } else {
                var s = document.createElement('script');
                s.src = 'https://pl29464105.effectivecpmnetwork.com/1b/a8/38/1ba838ed76bc22378f33cccb731d8356.js';
                document.head.appendChild(s);
            }
        })();
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a0f, #1a1a2e); color: #fff; min-height: 100vh; }
        .navbar { background: rgba(5,5,8,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-btn { color: #94a3b8; text-decoration: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .chat-container { background: rgba(255,255,255,0.05); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; height: 70vh; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .message { margin-bottom: 1rem; display: flex; gap: 1rem; }
        .message.user { justify-content: flex-end; }
        .message.user .bubble { background: linear-gradient(135deg, #6366f1, #4f46e5); border-radius: 20px 20px 4px 20px; }
        .message.assistant .bubble { background: rgba(255,255,255,0.1); border-radius: 20px 20px 20px 4px; }
        .bubble { max-width: 70%; padding: 1rem; border-radius: 20px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
        .chat-input { padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 1rem; }
        .chat-input input { flex: 1; padding: 1rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; color: white; font-size: 1rem; }
        .chat-input input:focus { outline: none; border-color: #6366f1; }
        .btn { padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: 600; cursor: pointer; border: none; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn:hover { transform: translateY(-2px); }
        .typing { display: flex; gap: 0.3rem; padding: 1rem; }
        .typing span { width: 8px; height: 8px; background: #6366f1; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .footer { background: rgba(255,255,255,0.05); border-top: 1px solid rgba(255,255,255,0.1); padding: 2rem; text-align: center; margin-top: 2rem; }
        @media (max-width: 768px) { .bubble { max-width: 85%; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <div class="logo">🤖 AI Assistant</div>
            <div id="authStatus"></div>
        </div>
    </nav>

    <div class="container">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant"><div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">Hello! I'm your AI assistant powered by DeepSeek-V3. Ask me anything! 💬</div></div>
            </div>
            <div class="chat-input"><input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()"><button class="btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button></div>
        </div>
    </div>

    <footer class="footer"><p>Made with <i class="fas fa-heart" style="color:#ec4899;"></i> by <strong>Dev Gift</strong> | +2349164624021</p></footer>

    <script>
        const token = localStorage.getItem('token');
        let isLoading = false;
        if (!token) { document.getElementById('authStatus').innerHTML = '<a href="/login.html" style="color:#6366f1;">Login to use AI</a>'; document.getElementById('messageInput').disabled = true; }
        else { document.getElementById('authStatus').innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle"></i> Ready</span>'; loadHistory(); }

        async function loadHistory() {
            try { const res = await fetch('/api/ai/history', { headers: { 'Authorization': `Bearer ${token}` } }); const history = await res.json(); if(history.length) { const messagesDiv = document.getElementById('chatMessages'); messagesDiv.innerHTML = history.map(h => `<div class="message user"><div class="bubble">${escapeHtml(h.message)}</div><div class="avatar"><i class="fas fa-user"></i></div></div><div class="message assistant"><div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">${escapeHtml(h.response)}</div></div>`).join(''); messagesDiv.scrollTop = messagesDiv.scrollHeight; } } catch(e){} }

        async function sendMessage() {
            const input = document.getElementById('messageInput'); const message = input.value.trim(); if (!message || isLoading) return;
            input.value = ''; isLoading = true;
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML += `<div class="message user"><div class="bubble">${escapeHtml(message)}</div><div class="avatar"><i class="fas fa-user"></i></div></div>`;
            const typingDiv = document.createElement('div'); typingDiv.className = 'message assistant'; typingDiv.innerHTML = `<div class="avatar"><i class="fas fa-robot"></i></div><div class="typing"><span></span><span></span><span></span></div>`;
            messagesDiv.appendChild(typingDiv); messagesDiv.scrollTop = messagesDiv.scrollHeight;
            try { const res = await fetch('/api/ai/chat', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ message }) }); const data = await res.json();
                typingDiv.remove(); messagesDiv.innerHTML += `<div class="message assistant"><div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">${escapeHtml(data.response || 'Sorry, I had trouble responding.')}</div></div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch(e) { typingDiv.remove(); messagesDiv.innerHTML += `<div class="message assistant"><div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">Error: Please try again.</div></div>`; }
            isLoading = false;
        }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    </script>
</body>
</html>
