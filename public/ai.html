    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Theme Variables */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255,255,255,0.05);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --user-msg: linear-gradient(135deg, #6366f1, #4f46e5);
            --ai-msg: rgba(255,255,255,0.1);
        }
        
        body.light {
            --bg-primary: #f8fafc;
            --bg-secondary: #e2e8f0;
            --bg-card: rgba(0,0,0,0.03);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: rgba(0,0,0,0.1);
            --primary: #6366f1;
            --user-msg: linear-gradient(135deg, #6366f1, #4f46e5);
            --ai-msg: rgba(0,0,0,0.05);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        
        /* Navbar */
        .navbar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-btn {
            color: var(--text-secondary);
            text-decoration: none;
        }
        
        /* Theme Toggle */
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.3rem;
            cursor: pointer;
            display: flex;
            gap: 0.3rem;
        }
        .theme-toggle span {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .theme-toggle span.active {
            background: var(--primary);
            color: white;
        }
        
        /* Chat Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .chat-container {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            height: 70vh;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        /* Message Bubbles */
        .message {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .message.user .bubble {
            background: var(--user-msg);
            border-radius: 20px 20px 4px 20px;
        }
