<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools - DEVHUB</title>
    
    <script>
        (function() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(res => res.json())
                    .then(user => {
                        if (user.role !== 'admin') {
                            var s = document.createElement('script');
                            s.src = 'https://pl29464105.effectivecpmnetwork.com/1b/a8/38/1ba838ed76bc22378f33cccb731d8356.js';
                            document.head.appendChild(s);
                        }
                    })
                    .catch(() => {});
            } else {
                var s = document.createElement('script');
                s.src = 'https://pl29464105.effectivecpmnetwork.com/1b/a8/38/1ba838ed76bc22378f33cccb731d8356.js';
                document.head.appendChild(s);
            }
        })();
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a0f, #1a1a2e); color: #fff; min-height: 100vh; }
        .navbar { background: rgba(5,5,8,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-btn { color: #94a3b8; text-decoration: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }
        .tab-btn { background: rgba(255,255,255,0.1); border: none; color: #94a3b8; padding: 0.75rem 1.5rem; cursor: pointer; font-size: 1rem; border-radius: 50px; transition: all 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, #6366f1, #ec4899); color: white; }
        .tool-card { background: rgba(255,255,255,0.05); border-radius: 24px; padding: 2rem; text-align: center; max-width: 600px; margin: 0 auto; }
        .tool-icon { font-size: 3rem; margin-bottom: 1rem; color: #6366f1; }
        h2 { margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; margin-bottom: 2rem; }
        .input-group { margin-bottom: 1.5rem; }
        input, textarea { width: 100%; padding: 1rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; font-size: 1rem; }
        input:focus, textarea:focus { outline: none; border-color: #6366f1; }
        .button-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 0.8rem 2rem; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .result-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 1.5rem; margin-top: 2rem; text-align: center; }
        .qr-image { max-width: 200px; margin: 1rem auto; display: block; }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 1rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: rgba(0,0,0,0.9); padding: 1rem 1.5rem; border-radius: 12px; border-left: 4px solid #10b981; animation: slideIn 0.3s ease; z-index: 1000; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .footer { background: rgba(255,255,255,0.05); border-top: 1px solid rgba(255,255,255,0.1); padding: 2rem; text-align: center; margin-top: 4rem; }
        @media (max-width: 768px) { .container { padding: 1rem; } .tabs { gap: 0.5rem; } .tab-btn { padding: 0.5rem 1rem; font-size: 0.8rem; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <div class="logo">🛠️ Utility Tools</div>
            <div id="authStatus"></div>
        </div>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('qr')"><i class="fas fa-qrcode"></i> QR Code</button>
            <button class="tab-btn" onclick="switchTab('shorten')"><i class="fas fa-link"></i> URL Shortener</button>
            <button class="tab-btn" onclick="switchTab('base64')"><i class="fas fa-code"></i> Base64</button>
        </div>

        <div id="qrTab" class="tool-card">
            <div class="tool-icon"><i class="fas fa-qrcode"></i></div>
            <h2>QR Code Generator</h2>
            <p class="subtitle">Generate QR codes for any text or URL</p>
            <div class="input-group"><textarea id="qrText" rows="3" placeholder="Enter text or URL..."></textarea></div>
            <button class="btn btn-primary" onclick="generateQR()"><i class="fas fa-qrcode"></i> Generate QR Code</button>
            <div id="qrResult"></div>
        </div>

        <div id="shortenTab" class="tool-card" style="display: none;">
            <div class="tool-icon"><i class="fas fa-link"></i></div>
            <h2>URL Shortener</h2>
            <p class="subtitle">Shorten long URLs instantly</p>
            <div class="input-group"><input type="text" id="longUrl" placeholder="Enter long URL..."></div>
            <button class="btn btn-primary" onclick="shortenURL()"><i class="fas fa-cut"></i> Shorten URL</button>
            <div id="shortenResult"></div>
        </div>

        <div id="base64Tab" class="tool-card" style="display: none;">
            <div class="tool-icon"><i class="fas fa-code"></i></div>
            <h2>Base64 Encoder/Decoder</h2>
            <p class="subtitle">Encode or decode Base64 strings</p>
            <div class="input-group"><textarea id="base64Text" rows="3" placeholder="Enter text to encode or Base64 to decode..."></textarea></div>
            <div class="button-group"><button class="btn btn-primary" onclick="base64Encode()"><i class="fas fa-lock"></i> Encode</button><button class="btn btn-primary" onclick="base64Decode()"><i class="fas fa-unlock"></i> Decode</button></div>
            <div id="base64Result"></div>
        </div>
    </div>

    <footer class="footer"><p>Made with <i class="fas fa-heart" style="color:#ec4899;"></i> by <strong>Dev Gift</strong> | +2349164624021</p></footer>

    <script>
        const token = localStorage.getItem('token');
        if (!token) { document.getElementById('authStatus').innerHTML = '<a href="/login.html" style="color:#6366f1;">Login to use tools</a>'; }
        else { document.getElementById('authStatus').innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle"></i> Ready</span>'; }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('[id$="Tab"]').forEach(div => div.style.display = 'none');
            document.getElementById(`${tab}Tab`).style.display = 'block';
            event.target.classList.add('active');
        }

        async function generateQR() {
            const text = document.getElementById('qrText').value;
            if (!text) { showToast('Please enter text or URL', 'error'); return; }
            const resultDiv = document.getElementById('qrResult');
            resultDiv.innerHTML = '<div class="loader"></div>';
            try {
                const res = await fetch(`/api/qr?text=${encodeURIComponent(text)}`);
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                resultDiv.innerHTML = `<div class="result-card"><img src="${url}" class="qr-image"><a href="${url}" download="qrcode.png" class="btn btn-primary">Download QR Code</a></div>`;
                showToast('QR Code generated!', 'success');
            } catch(e) { resultDiv.innerHTML = `<div class="result-card"><p style="color:#ef4444;">Failed to generate QR</p></div>`; }
        }

        async function shortenURL() {
            if (!token) { showToast('Please login', 'error'); return; }
            const url = document.getElementById('longUrl').value;
            if (!url) { showToast('Please enter URL', 'error'); return; }
            const resultDiv = document.getElementById('shortenResult');
            resultDiv.innerHTML = '<div class="loader"></div>';
            try {
                const res = await fetch(`/api/shorten?url=${encodeURIComponent(url)}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.shortUrl) {
                    resultDiv.innerHTML = `<div class="result-card"><p>Shortened URL:</p><a href="${data.shortUrl}" target="_blank" style="color:#6366f1;">${data.shortUrl}</a><button class="btn btn-primary" onclick="navigator.clipboard.writeText('${data.shortUrl}')" style="margin-top: 1rem;">Copy</button></div>`;
                    showToast('URL shortened!', 'success');
                } else { resultDiv.innerHTML = `<div class="result-card"><p style="color:#ef4444;">Failed to shorten</p></div>`; }
            } catch(e) { resultDiv.innerHTML = `<div class="result-card"><p style="color:#ef4444;">Error: ${e.message}</p></div>`; }
        }

        async function base64Encode() {
            const text = document.getElementById('base64Text').value;
            if (!text) { showToast('Please enter text', 'error'); return; }
            const resultDiv = document.getElementById('base64Result');
            resultDiv.innerHTML = '<div class="loader"></div>';
            try {
                const res = await fetch(`/api/base64/encode?text=${encodeURIComponent(text)}`);
                const data = await res.json();
                resultDiv.innerHTML = `<div class="result-card"><p><strong>Encoded:</strong></p><code>${data.encoded}</code><button class="btn btn-primary" onclick="navigator.clipboard.writeText('${data.encoded}')" style="margin-top: 1rem;">Copy</button></div>`;
                showToast('Encoded!', 'success');
            } catch(e) { resultDiv.innerHTML = `<div class="result-card"><p style="color:#ef4444;">Encoding failed</p></div>`; }
        }

        async function base64Decode() {
            const code = document.getElementById('base64Text').value;
            if (!code) { showToast('Please enter Base64 code', 'error'); return; }
            const resultDiv = document.getElementById('base64Result');
            resultDiv.innerHTML = '<div class="loader"></div>';
            try {
                const res = await fetch(`/api/base64/decode?code=${encodeURIComponent(code)}`);
                const data = await res.json();
                resultDiv.innerHTML = `<div class="result-card"><p><strong>Decoded:</strong></p><code>${data.decoded}</code><button class="btn btn-primary" onclick="navigator.clipboard.writeText('${data.decoded}')" style="margin-top: 1rem;">Copy</button></div>`;
                showToast('Decoded!', 'success');
            } catch(e) { resultDiv.innerHTML = `<div class="result-card"><p style="color:#ef4444;">Decoding failed</p></div>`; }
        }

        function showToast(msg, type) { const t=document.createElement('div'); t.className='toast'; t.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    </script>
</body>
</html>
