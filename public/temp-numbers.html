<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Numbers - DEVHUB</title>
    
    <!-- ADSTERRA POPUNDER -->
    <script src="https://pl29464105.effectivecpmnetwork.com/1b/a8/38/1ba838ed76bc22378f33cccb731d8356.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(5,5,8,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-btn { color: #94a3b8; text-decoration: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .stats { text-align: center; margin-bottom: 2rem; }
        .stats h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .stats p { color: #94a3b8; }
        .controls { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-outline { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; }
        .numbers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .number-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .number-card:hover { border-color: #6366f1; transform: translateY(-2px); }
        .number { font-size: 1.2rem; font-weight: 600; color: #6366f1; }
        .provider { font-size: 0.8rem; color: #94a3b8; margin-top: 0.25rem; }
        .inbox-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        .inbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .message-item {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .message-item:hover { background: rgba(99,102,241,0.1); }
        .message-from { font-weight: 600; color: #6366f1; }
        .message-text { margin-top: 0.5rem; color: #e2e8f0; }
        .message-time { font-size: 0.7rem; color: #94a3b8; margin-top: 0.5rem; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
        }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 2rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(0,0,0,0.9);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border-left: 4px solid #10b981;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .footer { background: rgba(255,255,255,0.05); border-top: 1px solid rgba(255,255,255,0.1); padding: 2rem; text-align: center; margin-top: 4rem; }
        @media (max-width: 768px) { .numbers-grid { grid-template-columns: 1fr; } .controls { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <div class="logo">📞 Temp Numbers</div>
            <div id="authStatus"></div>
        </div>
    </nav>

    <div class="container">
        <div class="stats">
            <h1>📱 Temporary Phone Numbers</h1>
            <p>Get virtual numbers to receive SMS - Free & Anonymous</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="loadNumbers()"><i class="fas fa-sync-alt"></i> Get Numbers</button>
            <button class="btn btn-outline" onclick="refreshInbox()"><i class="fas fa-envelope"></i> Refresh Inbox</button>
        </div>

        <div id="numbersGrid" class="numbers-grid">
            <div class="loader"></div>
        </div>

        <div id="inboxContainer" class="inbox-container" style="display: none;">
            <div class="inbox-header">
                <h3><i class="fas fa-inbox"></i> Inbox: <span id="selectedNumber"></span></h3>
                <span id="providerName" style="color:#94a3b8;"></span>
            </div>
            <div id="messagesList"></div>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="messageModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeMessageModal()">&times;</span>
            <h3 id="modalFrom">Message</h3>
            <p id="modalMessage" style="margin: 1rem 0;"></p>
            <small id="modalTime" style="color:#94a3b8;"></small>
        </div>
    </div>

    <footer class="footer">
        <p>Made with <i class="fas fa-heart" style="color:#ec4899;"></i> by <strong>Dev Gift</strong> | +2349164624021</p>
    </footer>

    <script>
        const token = localStorage.getItem('token');
        let currentNumber = null;
        let currentProvider = null;

        if (!token) {
            document.getElementById('authStatus').innerHTML = '<a href="/login.html" style="color:#6366f1;">Login to use temp numbers</a>';
            showToast('Please login first', 'error');
        } else {
            document.getElementById('authStatus').innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle"></i> Ready</span>';
            loadNumbers();
        }

        async function loadNumbers() {
            const grid = document.getElementById('numbersGrid');
            grid.innerHTML = '<div class="loader"></div>';
            try {
                const res = await fetch('/api/temp-numbers', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.numbers && data.numbers.length) {
                    grid.innerHTML = data.numbers.map(num => `
                        <div class="number-card" onclick="selectNumber('${num.number}', '${num.provider}')">
                            <div class="number">${num.number}</div>
                            <div class="provider"><i class="fas fa-server"></i> ${num.provider}</div>
                        </div>
                    `).join('');
                    showToast(`${data.numbers.length} numbers available!`, 'success');
                } else {
                    grid.innerHTML = '<p style="text-align:center;">No numbers available. Try again later.</p>';
                }
            } catch(e) {
                grid.innerHTML = '<p style="text-align:center; color:#ef4444;">Failed to load numbers</p>';
            }
        }

        async function selectNumber(number, provider) {
            currentNumber = number;
            currentProvider = provider;
            document.getElementById('selectedNumber').innerText = number;
            document.getElementById('providerName').innerHTML = `<i class="fas fa-server"></i> ${provider}`;
            document.getElementById('inboxContainer').style.display = 'block';
            await loadInbox();
        }

        async function loadInbox() {
            if (!currentNumber) return;
            const messagesDiv = document.getElementById('messagesList');
            messagesDiv.innerHTML = '<div class="loader"></div>';
            try {
                const res = await fetch(`/api/temp-inbox?number=${encodeURIComponent(currentNumber)}&provider=${currentProvider}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.messages && data.messages.length) {
                    messagesDiv.innerHTML = data.messages.map(msg => `
                        <div class="message-item" onclick="viewMessage('${msg.from || 'Unknown'}', '${(msg.message || msg.text || msg.body || '').replace(/'/g, "\\'")}', '${msg.time || new Date().toLocaleString()}')">
                            <div class="message-from"><i class="fas fa-user"></i> ${msg.from || 'Unknown'}</div>
                            <div class="message-text">${(msg.message || msg.text || msg.body || '').substring(0, 100)}${(msg.message || msg.text || msg.body || '').length > 100 ? '...' : ''}</div>
                            <div class="message-time"><i class="far fa-clock"></i> ${msg.time || new Date().toLocaleString()}</div>
                        </div>
                    `).join('');
                    showToast(`${data.messages.length} messages found`, 'success');
                } else {
                    messagesDiv.innerHTML = '<p style="text-align:center; color:#94a3b8;">No messages yet. Share your number to receive SMS.</p>';
                }
            } catch(e) {
                messagesDiv.innerHTML = '<p style="text-align:center; color:#ef4444;">Failed to load messages</p>';
            }
        }

        function refreshInbox() {
            if (currentNumber) {
                loadInbox();
            } else {
                showToast('Select a number first', 'error');
            }
        }

        function viewMessage(from, message, time) {
            document.getElementById('modalFrom').innerHTML = `<i class="fas fa-user"></i> From: ${from}`;
            document.getElementById('modalMessage').innerHTML = message;
            document.getElementById('modalTime').innerHTML = `<i class="far fa-clock"></i> ${time}`;
            document.getElementById('messageModal').classList.add('active');
        }

        function closeMessageModal() {
            document.getElementById('messageModal').classList.remove('active');
        }

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
