<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Numbers - DEVHUB</title>
    
    <!-- Adsterra Ads -->
    <script src="https://penguinsincequalify.com/f4/63/a7/f463a78a655d5b6a10eaeec7146802e9.js"></script>
    <script async="async" data-cfasync="false" src="https://penguinsincequalify.com/b26d1487549578016dcb13eeeae72f35/invoke.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255,255,255,0.05);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --primary: #6366f1;
            --success: #10b981;
        }
        
        body.light {
            --bg-primary: #f8fafc;
            --bg-secondary: #e2e8f0;
            --bg-card: rgba(0,0,0,0.03);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: rgba(0,0,0,0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        
        .navbar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-btn { color: var(--text-secondary); text-decoration: none; }
        
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.3rem;
            cursor: pointer;
            display: flex;
            gap: 0.3rem;
        }
        .theme-toggle span {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .theme-toggle span.active {
            background: var(--primary);
            color: white;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .stats { text-align: center; margin-bottom: 2rem; }
        .stats h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        
        .controls { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .btn { padding: 0.8rem 1.5rem; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-outline { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); }
        
        .numbers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .number-card { background: var(--bg-card); border-radius: 16px; padding: 1rem; border: 1px solid var(--border); cursor: pointer; transition: all 0.3s; }
        .number-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .number { font-size: 1.2rem; font-weight: 600; color: var(--primary); }
        .provider { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
        
        .inbox-container { background: var(--bg-card); border-radius: 20px; padding: 1.5rem; margin-top: 2rem; }
        .inbox-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .message-item { background: rgba(99,102,241,0.1); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; cursor: pointer; transition: all 0.3s; }
        .message-item:hover { background: rgba(99,102,241,0.2); }
        .message-from { font-weight: 600; color: var(--primary); }
        .message-text { margin-top: 0.5rem; color: var(--text-primary); }
        .message-time { font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.5rem; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-primary); border-radius: 24px; padding: 2rem; max-width: 500px; width: 90%; border: 1px solid var(--border); }
        .close-modal { float: right; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); }
        
        .loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 2rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .native-ad { background: var(--bg-card); border-radius: 16px; margin: 2rem 0; padding: 1rem; text-align: center; border: 1px solid var(--border); }
        .ad-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        .footer { background: var(--bg-card); border-top: 1px solid var(--border); padding: 2rem; text-align: center; margin-top: 4rem; }
        
        @media (max-width: 768px) { .numbers-grid { grid-template-columns: 1fr; } .controls { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
            <div class="logo">📞 Temp Numbers</div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="theme-toggle" id="themeToggle">
                    <span class="dark active" onclick="setTheme('dark')"><i class="fas fa-moon"></i></span>
                    <span class="light" onclick="setTheme('light')"><i class="fas fa-sun"></i></span>
                </div>
                <div id="authStatus"></div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="stats">
            <h1>📱 Temporary Phone Numbers</h1>
            <p>Get virtual numbers to receive SMS - Free & Anonymous</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="loadNumbers()"><i class="fas fa-sync-alt"></i> Get Numbers</button>
            <button class="btn btn-outline" onclick="refreshInbox()"><i class="fas fa-envelope"></i> Refresh Inbox</button>
        </div>

        <div id="numbersGrid" class="numbers-grid"><div class="loader"></div></div>

        <div id="inboxContainer" class="inbox-container" style="display: none;">
            <div class="inbox-header">
                <h3><i class="fas fa-inbox"></i> Inbox: <span id="selectedNumber"></span></h3>
                <span id="providerName" style="color:var(--text-secondary);"></span>
            </div>
            <div id="messagesList"></div>
        </div>

        <!-- Native Ad -->
        <div class="native-ad">
            <span class="ad-label">Sponsored</span>
            <div id="container-b26d1487549578016dcb13eeeae72f35"></div>
        </div>
    </div>

    <div id="messageModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeMessageModal()">&times;</span>
            <h3 id="modalFrom">Message</h3>
            <p id="modalMessage" style="margin: 1rem 0;"></p>
            <small id="modalTime" style="color:var(--text-secondary);"></small>
        </div>
    </div>

    <footer class="footer"><p>Made with <i class="fas fa-heart" style="color:#ec4899;"></i> by <strong>Dev Gift</strong> | +2349164624021</p></footer>

    <script>
        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('theme', theme);
            document.querySelectorAll('.theme-toggle span').forEach(span => {
                span.classList.remove('active');
                if ((theme === 'dark' && span.classList.contains('dark')) ||
                    (theme === 'light' && span.classList.contains('light'))) {
                    span.classList.add('active');
                }
            });
        }
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);
        
        const token = localStorage.getItem('token');
        let currentNumber = null, currentProvider = null, currentSlug = null;

        if (!token) {
            document.getElementById('authStatus').innerHTML = '<a href="/login.html" style="color:#6366f1;">Login to use temp numbers</a>';
        } else {
            document.getElementById('authStatus').innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle"></i> Ready</span>';
            loadNumbers();
        }

        async function loadNumbers() {
            const grid = document.getElementById('numbersGrid');
            grid.innerHTML = '<div class="loader"></div>';
            try {
                const res = await fetch('/api/temp-numbers', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.numbers && data.numbers.length) {
                    grid.innerHTML = data.numbers.map(num => `
                        <div class="number-card" onclick="selectNumber('${num.number}', '${num.provider}', '${num.slug || ''}')">
                            <div class="number">${num.number}</div>
                            <div class="provider"><i class="fas fa-server"></i> ${num.provider} - ${num.country}</div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<p style="text-align:center;">No numbers available. Try again later.</p>';
                }
            } catch(e) {
                grid.innerHTML = '<p style="text-align:center; color:#ef4444;">Failed to load numbers</p>';
            }
        }

        async function selectNumber(number, provider, slug) {
            currentNumber = number;
            currentProvider = provider;
            currentSlug = slug;
            document.getElementById('selectedNumber').innerText = number;
            document.getElementById('providerName').innerHTML = `<i class="fas fa-server"></i> ${provider}`;
            document.getElementById('inboxContainer').style.display = 'block';
            await loadInbox();
        }

        async function loadInbox() {
            if (!currentNumber) return;
            const messagesDiv = document.getElementById('messagesList');
            messagesDiv.innerHTML = '<div class="loader"></div>';
            try {
                let url = `/api/temp-inbox?number=${encodeURIComponent(currentNumber)}&provider=${currentProvider}`;
                if (currentSlug) url += `&slug=${currentSlug}`;
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                
                if (data.messages && data.messages.length > 0) {
                    messagesDiv.innerHTML = data.messages.map(msg => `
                        <div class="message-item" onclick="viewMessage('${escapeHtml(msg.from || 'Unknown')}', '${escapeHtml(msg.message || msg.text || msg.body || 'No content')}', '${msg.time || new Date().toLocaleString()}')">
                            <div class="message-from"><i class="fas fa-user"></i> ${escapeHtml(msg.from || 'Unknown')}</div>
                            <div class="message-text">${escapeHtml((msg.message || msg.text || msg.body || '').substring(0, 100))}${(msg.message || msg.text || msg.body || '').length > 100 ? '...' : ''}</div>
                            <div class="message-time"><i class="far fa-clock"></i> ${msg.time || new Date().toLocaleString()}</div>
                        </div>
                    `).join('');
                } else {
                    messagesDiv.innerHTML = '<div style="text-align: center; padding: 2rem;"><i class="fas fa-inbox" style="font-size: 3rem; color: var(--text-secondary); margin-bottom: 1rem; display: block;"></i><p>No messages yet for this number.</p><small>Share this number to receive SMS verification codes.</small></div>';
                }
            } catch(e) {
                messagesDiv.innerHTML = '<div style="text-align: center; padding: 2rem;"><i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem; display: block;"></i><p>Could not load messages.</p><button class="btn btn-outline" onclick="loadInbox()" style="margin-top: 1rem;">Try Again</button></div>';
            }
        }

        function refreshInbox() { if (currentNumber) loadInbox(); }
        function viewMessage(from, message, time) {
            document.getElementById('modalFrom').innerHTML = `<i class="fas fa-user"></i> From: ${from}`;
            document.getElementById('modalMessage').innerHTML = message;
            document.getElementById('modalTime').innerHTML = `<i class="far fa-clock"></i> ${time}`;
            document.getElementById('messageModal').classList.add('active');
        }
        function closeMessageModal() { document.getElementById('messageModal').classList.remove('active'); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    </script>
</body>
</html>
